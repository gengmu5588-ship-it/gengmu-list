<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>轻图社-资源站</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --color-dark: #121212;
      --color-card: #1e1e1e;
      --color-card-hover: #252525;
      --color-primary: #7C3AED;
      --color-primary-hover: #8B5CF6;
      --color-text: #e5e7eb;
      --color-text-muted: #9ca3af;
      --color-border: #374151;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--color-dark);
      color: var(--color-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      line-height: 1.6;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }

    .animate-slide-up {
      animation: slideUp 0.5s ease-out forwards;
    }

    .navbar {
      background: rgba(30, 30, 30, 0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid var(--color-border);
      padding: 1rem;
    }

    .navbar-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 1rem;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .navbar-logo {
      width: 2.5rem;
      height: 2.5rem;
      background: linear-gradient(135deg, var(--color-primary), #a78bfa);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .navbar-title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--color-primary), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn {
      background: linear-gradient(135deg, var(--color-primary), #6d28d9);
      color: white;
      padding: 0.625rem 1.25rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover {
      background: linear-gradient(135deg, var(--color-primary-hover), #7c3aed);
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: rgba(55, 65, 81, 0.5);
    }

    .btn-secondary:hover {
      background: rgba(75, 85, 99, 0.7);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    .card {
      background: var(--color-card);
      border-radius: 0.75rem;
      overflow: hidden;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }

    .card:hover {
      background: var(--color-card-hover);
      transform: scale(1.02);
      box-shadow: 0 10px 40px rgba(124, 58, 237, 0.1);
      border-color: rgba(124, 58, 237, 0.2);
    }

    .card-image {
      position: relative;
      overflow: hidden;
    }

    .card-image img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .card:hover .card-image img {
      transform: scale(1.1);
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .card-content {
      padding: 0.75rem;
    }

    .card-title {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-price {
      color: var(--color-primary);
      font-weight: 700;
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    .input-field {
      background: rgba(10, 10, 10, 0.5);
      color: white;
      border: 1px solid var(--color-border);
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      width: 100%;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .input-field::placeholder {
      color: #6b7280;
    }

    textarea.input-field {
      min-height: 120px;
      resize: vertical;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
    }

    .grid-gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    @media (min-width: 640px) {
      .grid-gallery {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 768px) {
      .grid-gallery {
        grid-template-columns: repeat(4, 1fr);
        gap: 1.25rem;
      }
    }

    .grid-preview {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    @media (min-width: 640px) {
      .grid-preview {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .success-box {
      background: rgba(34, 197, 94, 0.05);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-top: 1rem;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--color-text-muted);
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      margin-bottom: 0.5rem;
    }

    .page-subtitle {
      color: var(--color-text-muted);
      font-size: 0.875rem;
    }

    .admin-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: rgba(30, 30, 30, 0.5);
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      border: 1px solid var(--color-border);
      transition: all 0.3s ease;
    }

    .admin-item:hover {
      background: rgba(30, 30, 30, 0.8);
      border-color: var(--color-primary);
    }

    .admin-item-info {
      flex: 1;
    }

    .admin-item-title {
      font-weight: 500;
      color: var(--color-text);
    }

    .admin-item-price {
      font-size: 0.75rem;
      color: var(--color-text-muted);
    }

    .price-display {
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-primary);
      margin: 1rem 0;
    }

    .link-box {
      margin-top: 1rem;
      padding: 1rem;
      background: rgba(34, 197, 94, 0.05);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 0.75rem;
      display: none;
    }

    .link-box.show {
      display: block;
      animation: slideUp 0.3s ease-out;
    }

    .hidden {
      display: none !important;
    }

    /* 支付宝弹窗样式 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      padding: 1rem;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--color-card);
      border-radius: 1rem;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      transform: scale(0.9) translateY(20px);
      transition: all 0.3s ease;
      border: 1px solid var(--color-border);
    }

    .modal-overlay.show .modal-content {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      background: linear-gradient(135deg, #1677ff, #0056d6);
      padding: 1.25rem;
      text-align: center;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      width: 1.75rem;
      height: 1.75rem;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      transition: background 0.2s ease;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .modal-header h3 {
      color: white;
      font-size: 1.125rem;
      font-weight: 600;
    }

    .modal-body {
      padding: 1.5rem;
    }

    .qr-container {
      background: white;
      border-radius: 0.75rem;
      padding: 1rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .qr-code {
      width: 180px;
      height: 180px;
      margin: 0 auto;
      background: linear-gradient(135deg, #1677ff, #0056d6);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .qr-code svg {
      width: 160px;
      height: 160px;
    }

    .amount-display {
      text-align: center;
      margin-bottom: 1rem;
    }

    .amount-label {
      color: var(--color-text-muted);
      font-size: 0.875rem;
      margin-bottom: 0.25rem;
    }

    .amount-value {
      font-size: 2rem;
      font-weight: 700;
      color: #1677ff;
    }

    .countdown-container {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 0.5rem;
      padding: 1rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .countdown-label {
      color: #ef4444;
      font-size: 0.875rem;
      margin-bottom: 0.25rem;
    }

    .countdown-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ef4444;
      font-family: monospace;
    }

    .payment-tips {
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.75rem;
      line-height: 1.5;
    }

    .payment-tips i {
      margin-right: 0.25rem;
      color: #10b981;
    }

    /* 成功提示样式 */
    .success-box {
      background: rgba(34, 197, 94, 0.05);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-top: 1rem;
    }

    .copy-btn {
      background: rgba(124, 58, 237, 0.2);
      color: var(--color-primary);
      border: none;
      border-radius: 0.375rem;
      padding: 0.375rem 0.75rem;
      font-size: 0.75rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      transition: all 0.2s ease;
      margin-top: 0.5rem;
    }

    .copy-btn:hover {
      background: rgba(124, 58, 237, 0.3);
    }

    .copy-btn.copied {
      background: rgba(34, 197, 94, 0.2);
      color: #10b981;
    }

    /* 收款配置样式 */
    .payment-config {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .payment-option {
      flex: 1;
      padding: 1rem;
      border: 2px solid var(--color-border);
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }

    .payment-option:hover {
      border-color: var(--color-primary);
    }

    .payment-option.active {
      border-color: var(--color-primary);
      background: rgba(124, 58, 237, 0.1);
    }

    .payment-option i {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .payment-option.alipay i {
      color: #1677ff;
    }

    .payment-option.wechat i {
      color: #10b981;
    }

    .payment-option span {
      font-size: 0.875rem;
      color: var(--color-text);
    }

    /* 聊天消息样式 */
    .chat-container {
      height: 400px;
      overflow-y: auto;
      padding: 1rem;
      background: rgba(10, 10, 10, 0.5);
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      -webkit-overflow-scrolling: touch;
    }

    .chat-message {
      margin-bottom: 1rem;
      display: flex;
    }

    .chat-message.user {
      justify-content: flex-end;
    }

    .chat-message.admin {
      justify-content: flex-start;
    }

    .chat-message.self {
      justify-content: flex-end;
    }

    .chat-message.other {
      justify-content: flex-start;
    }

    .chat-bubble {
      max-width: 15ch;
      min-width: fit-content;
      width: fit-content;
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      font-size: 0.875rem;
      word-break: break-all;
      white-space: pre-wrap;
    }

    .chat-message.user .chat-bubble {
      background: var(--color-primary);
      color: white;
      border-bottom-right-radius: 0.25rem;
    }

    .chat-message.admin .chat-bubble {
      background: var(--color-card);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      border-bottom-left-radius: 0.25rem;
    }

    .chat-message.self .chat-bubble {
      background: var(--color-primary);
      color: white;
      border-bottom-right-radius: 0.25rem;
    }

    .chat-message.other .chat-bubble {
      background: var(--color-card);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      border-bottom-left-radius: 0.25rem;
    }

    .chat-timestamp {
      font-size: 0.625rem;
      color: var(--color-text-muted);
      margin-top: 0.25rem;
      text-align: right;
    }

    .chat-input-container {
      display: flex;
      gap: 0.5rem;
    }

    .chat-input {
      flex: 1;
      background: rgba(10, 10, 10, 0.5);
      border: 1px solid var(--color-border);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      color: white;
    }

    .chat-input:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    /* 用户订单样式 */
    .order-item {
      background: rgba(30, 30, 30, 0.5);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 0.75rem;
      border: 1px solid var(--color-border);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .order-id {
      font-size: 0.75rem;
      color: var(--color-text-muted);
    }

    .order-status {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
    }

    .order-status.completed {
      background: rgba(34, 197, 94, 0.2);
      color: #10b981;
    }

    .order-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .order-product {
      font-weight: 500;
      color: var(--color-text);
    }

    .order-price {
      color: var(--color-primary);
      font-weight: 600;
    }

    /* 表单卡片样式 */
    .form-card {
      background: var(--color-card);
      border-radius: 1rem;
      padding: 1.5rem;
      border: 1px solid var(--color-border);
    }

    /* 图片上传区域样式 */
    .upload-area {
      border: 2px dashed var(--color-border);
      border-radius: 0.75rem;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 1rem;
    }

    .upload-area:hover {
      border-color: var(--color-primary);
      background: rgba(124, 58, 237, 0.05);
    }

    .upload-area.dragover {
      border-color: var(--color-primary);
      background: rgba(124, 58, 237, 0.1);
    }

    .editor-btn {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid transparent;
      border-radius: 0.25rem;
      color: var(--color-text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }
    .editor-btn:hover {
      background: rgba(124, 58, 237, 0.2);
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .upload-preview {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-top: 1rem;
    }

    @media (min-width: 640px) {
      .upload-preview {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .preview-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 0.5rem;
      overflow: hidden;
      border: 1px solid var(--color-border);
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-item .remove-btn {
      position: absolute;
      top: 0.25rem;
      right: 0.25rem;
      width: 1.5rem;
      height: 1.5rem;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .preview-item:hover .remove-btn {
      opacity: 1;
    }

    .preview-item .remove-btn:hover {
      background: rgba(239, 68, 68, 1);
    }

    .upload-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(124, 58, 237, 0.3);
    }

    .upload-progress-bar {
      height: 100%;
      background: var(--color-primary);
      transition: width 0.3s ease;
    }

    /* 私信列表样式 */
    .message-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
      max-height: 300px;
      overflow-y: auto;
    }

    .message-item {
      padding: 0.75rem;
      background: rgba(10, 10, 10, 0.5);
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .message-item:hover {
      background: rgba(124, 58, 237, 0.1);
      border-color: var(--color-primary);
    }

    .message-item.active {
      background: rgba(124, 58, 237, 0.15);
      border-color: var(--color-primary);
    }

    .message-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }

    .message-item-name {
      font-weight: 500;
      color: white;
    }

    .message-item-time {
      font-size: 0.75rem;
      color: var(--color-text-muted);
    }

    .message-item-preview {
      font-size: 0.875rem;
      color: var(--color-text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 链接状态样式 */
    .link-status {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
    }

    .link-status.normal {
      background: rgba(34, 197, 94, 0.2);
      color: #10b981;
    }

    .link-status.invalid {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .link-status.cancelled {
      background: rgba(251, 146, 60, 0.2);
      color: #fb923c;
    }

    /* 水印样式 */
    .watermark {
      position: relative;
    }

    .watermark::after {
      content: '视觉志杂货店';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 0 2px rgba(0, 0, 0, 0.5);
      user-select: none;
    }

    /* 首页横幅样式 */
    .hero-banner {
      width: 100%;
      height: 200px;
      border-radius: 1rem;
      overflow: hidden;
      margin-bottom: 2rem;
      position: relative;
    }

    .hero-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-banner.empty {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(167, 139, 250, 0.2));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-muted);
    }

    /* 分类导航样式 */
    .category-nav {

          localStorage.setItem('orders', JSON.stringify([...otherCloudOrders, ...myLocalOrders]));
        } else {
          localStorage.setItem('orders', JSON.stringify(cloudOrders));
        }
      }
      if (data.reviews) {
        const localReviews = getDB('reviews');
        const cloudReviews = data.reviews;
        if (currentUser) {
          const myLocalReviews = localReviews.filter(r => r.userId === currentUser.id);
          const otherCloudReviews = cloudReviews.filter(r => r.userId !== currentUser.id);
          localStorage.setItem('reviews', JSON.stringify([...otherCloudReviews, ...myLocalReviews]));
        } else {
          localStorage.setItem('reviews', JSON.stringify(cloudReviews));
        }
      }
      if (data.favorites) {
        const localFavorites = getDB('favorites');
        const cloudFavorites = data.favorites;
        if (currentUser) {
          const myLocalFav = localFavorites.filter(f => f.userId === currentUser.id);
          const otherCloudFav = cloudFavorites.filter(f => f.userId !== currentUser.id);
          localStorage.setItem('favorites', JSON.stringify([...otherCloudFav, ...myLocalFav]));
        } else {
          localStorage.setItem('favorites', JSON.stringify(cloudFavorites));
        }
      }
      _cloudReady = true;
    } else if (res.status === 404) {
      _cloudReady = true;
      if (isAdmin()) {
        const hasLocalData = DATA_KEYS.some(key => {
          const val = localStorage.getItem(key);
          return val && JSON.parse(val).length > 0;
        });
        if (hasLocalData) {
          setTimeout(cloudSave, 1000);
        }
      }
    }
  } catch (e) {
    console.warn('云端数据加载失败，使用本地缓存:', e);
    _cloudReady = true;
  }
}

async function cloudSave() {
  if (_cloudSyncing || !isAdmin()) return;
  _cloudSyncing = true;
  updateSyncStatus('syncing');

  try {
    const data = {};
    DATA_KEYS.forEach(key => {
      const val = localStorage.getItem(key);
      if (val) data[key] = JSON.parse(val);
    });

    const jsonStr = JSON.stringify(data);
    if (jsonStr.length > 25 * 1024 * 1024) {
      console.error('数据过大，无法同步到云端');
      updateSyncStatus('error');
      _cloudSyncing = false;
      return;
    }

    const content = btoa(unescape(encodeURIComponent(jsonStr)));
    const headers = {
      'Authorization': `token ${CLOUD.token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };

    if (!_cloudSha) {
      try {
        const info = await fetch(CLOUD.apiUrl, { headers });
        if (info.ok) _cloudSha = (await info.json()).sha;
      } catch (e) {}
    }

    const body = { message: `data sync: ${new Date().toISOString()}`, content, branch: CLOUD.branch };
    if (_cloudSha) body.sha = _cloudSha;

    const res = await fetch(CLOUD.apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
    if (res.ok) {
      const result = await res.json();
      _cloudSha = result.content.sha;
      updateSyncStatus('synced');
    } else {
      const err = await res.json().catch(() => ({}));
      if (err.message && err.message.includes('SHA')) {
        try {
          const info = await fetch(CLOUD.apiUrl, { headers });
          if (info.ok) {
            _cloudSha = (await info.json()).sha;
            body.sha = _cloudSha;
            const retry = await fetch(CLOUD.apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
            if (retry.ok) {
              _cloudSha = (await retry.json()).content.sha;
              updateSyncStatus('synced');
            } else {
              updateSyncStatus('error');
            }
          }
        } catch (e) { updateSyncStatus('error'); }
      } else {
        updateSyncStatus('error');
      }
    }
  } catch (e) {
    console.error('云端保存失败:', e);
    updateSyncStatus('error');
  }

  _cloudSyncing = false;
}

async function forceCloudSync() {
  if (!isAdmin()) return;
  updateSyncStatus('syncing');
  await cloudSave();
}

function updateSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (status === 'syncing') {
    el.innerHTML = '<i class="fas fa-sync fa-spin" style="color:var(--color-warning);"></i><span class="btn-text">同步中</span>';
  } else if (status === 'synced') {
    el.innerHTML = '<i class="fas fa-cloud" style="color:var(--color-primary);"></i><span class="btn-text">已同步</span>';
  } else {
    el.innerHTML = '<i class="fas fa-exclamation-circle" style="color:var(--color-danger);"></i><span class="btn-text">同步失败</span>';
  }
}

    renderDetail(root, path.split('=')[1]);
  } else if (path.startsWith('#category')) {
    const categoryId = path.split('=')[1] || '';
    renderIndex(root, categoryId);
  } else if (path === '#login') {
    renderLogin(root);
  } else if (path === '#admin') {

}

  const root = document.getElementById('root');

  const currentCatId = window.currentCategoryId || '';
  
  if (categoryId === currentCatId) return;
  
  const direction = getSlideDirection(currentCatId, categoryId);
  
  if (albumsContainer) {
    albumsContainer.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
    albumsContainer.style.transform = direction === 'left' ? 'translateX(-30px)' : 'translateX(30px)';
    albumsContainer.style.opacity = '0';
  }
  
  setTimeout(() => {
    window.currentCategoryId = categoryId;
    window.currentPage = '1';
    
    const albums = getDB('albums');
    let filteredAlbums = albums;
    if (categoryId && categoryId !== 'home') {
      filteredAlbums = albums.filter(a => a.categoryId === categoryId);
    }
    filteredAlbums.sort((a, b) => parseInt(b.id) - parseInt(a.id));
    
    const pageSize = 20;
    const currentPage = 1;
    const totalPages = Math.ceil(filteredAlbums.length / pageSize);
    const paginatedAlbums = filteredAlbums.slice(0, pageSize);
    const reviews = getDB('reviews') || [];
    const favorites = getDB('favorites') || [];
    const user = getCurrentUser();

      paginatedAlbums.forEach((al, index) => {
        const albumReviews = reviews.filter(r => r.albumId === al.id);
        const favCount = favorites.filter(f => f.albumId === al.id).length;
        const canReview = purchasedAlbumIds.has(al.id);
        galleryHtml += `
          <div class="card animate-slide-up" style="animation-delay: ${index * 0.1}s" onclick="openAlbum('${al.id}')">

      `;
    }
    
    const newContainer = document.querySelector('.grid-gallery');

    const paginationContainer = document.querySelector('.pagination');
    if (paginationContainer && paginationHtml) {

    } else if (paginationContainer && !paginationHtml) {

      const footer = document.querySelector('footer');
      if (footer) {
        footer.insertAdjacentHTML('beforebegin', paginationHtml);
      }
    }
    
    document.querySelectorAll('.category-item').forEach(el => {
      el.classList.remove('active');
      if (el.getAttribute('onclick')?.includes(`'${categoryId}'`)) {
        el.classList.add('active');
      }
    });
    
    const titleEl = document.querySelector('.page-title');
    if (titleEl) titleEl.textContent = '精选图集';
    const subtitleEl = document.querySelector('.page-subtitle');
    if (subtitleEl) subtitleEl.textContent = `共 ${filteredAlbums.length} 个图集`;

        newContainer.style.transform = 'translateX(0)';
        newContainer.style.opacity = '1';
      });

function getSlideDirection(from, to) {
  const categories = getDB('categories');
  categories.sort((a, b) => a.sort - b.sort);
  const fromIndex = categories.findIndex(c => c.id === (from || 'home'));
  const toIndex = categories.findIndex(c => c.id === to);
  return toIndex > fromIndex ? 'left' : 'right';
}

// 提交评论
function submitReview(albumId) {
  const content = document.getElementById('reviewContent').value.trim();
  const user = getCurrentUser();
  
  if (!content) {
    alert('请输入评论内容');
    return;
  }
  
  const review = {
    id: Date.now().toString(),
    albumId,
    userId: user.id,
    username: user.username,
    userAvatar: user.avatar,
    content,
    time: Date.now()
  };
  
  const reviews = getDB('reviews') || [];
  reviews.push(review);
  setDB('reviews', reviews);
  
  alert('评论提交成功！');
  document.querySelector('.modal-overlay').remove();
  renderPage();
}

function showSitePopup(config) {
  const popupKey = 'popup_closed_' + (config.popupTitle || '').replace(/\s/g, '') + '_' + config.popupContent.length;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay show';
  overlay.style.cssText = 'animation: fadeIn 0.3s ease;';
  overlay.innerHTML = `
    <div class="modal-content" style="max-width: 400px; text-align: center;">
      <div style="width: 3.5rem; height: 3.5rem; background: linear-gradient(135deg, var(--color-primary), #a78bfa); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
        <i class="fas fa-bullhorn text-white text-lg"></i>
      </div>
      <h3 style="font-size: 1.125rem; color: white; font-weight: 600; margin-bottom: 0.75rem;">${config.popupTitle || '📢 公告'}</h3>
      <p style="color: var(--color-text-muted); font-size: 0.875rem; white-space: pre-wrap; line-height: 1.7; margin-bottom: 1.5rem;">${config.popupContent}</p>
      <button class="btn" style="width: 100%; padding: 0.75rem; text-align: center;" onclick="closeSitePopup(this, '${popupKey}', '${config.popupBtnLink || ''}')">${config.popupBtnText || '我知道了'}</button>
    </div>
  `;
  document.body.appendChild(overlay);
}

function closeSitePopup(btn, popupKey, link) {
  const overlay = btn.closest('.modal-overlay');
  if (overlay) {
    overlay.style.animation = 'fadeOut 0.2s ease';
    setTimeout(() => overlay.remove(), 200);
  }
  localStorage.setItem(popupKey, '1');
  if (link) {
    if (link.startsWith('#')) {
      window.location.hash = link;
    } else if (link.startsWith('http')) {
      window.open(link, '_blank');
    }
  }
}

let heroBannerInterval = null;

function startHeroBannerCarousel() {
  if (heroBannerInterval) clearInterval(heroBannerInterval);
  heroBannerInterval = setInterval(() => {
    const items = document.querySelectorAll('.hero-banner-item');
    const indicators = document.querySelectorAll('.hero-banner-indicators .indicator');
    if (items.length === 0) return;
    const currentIndex = Array.from(items).findIndex(el => el.classList.contains('active'));
    const nextIndex = (currentIndex + 1) % items.length;
    items.forEach((item, i) => item.classList.toggle('active', i === nextIndex));
    indicators.forEach((ind, i) => ind.classList.toggle('active', i === nextIndex));
  }, 4000);
}

function goToHeroBanner(index) {
  const items = document.querySelectorAll('.hero-banner-item');
  const indicators = document.querySelectorAll('.hero-banner-indicators .indicator');
  items.forEach((item, i) => item.classList.toggle('active', i === index));
  indicators.forEach((ind, i) => ind.classList.toggle('active', i === index));
}

// 回到顶部按钮
function createBackToTop() {
  let backBtn = document.getElementById('backToTop');
  if (backBtn) return;
  
  backBtn = document.createElement('button');
  backBtn.id = 'backToTop';
  backBtn.className = 'back-to-top';
  backBtn.innerHTML = '<i class="fas fa-chevron-up"></i>';
  backBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
  document.body.appendChild(backBtn);
  
  window.addEventListener('scroll', () => {
    backBtn.classList.toggle('show', window.scrollY > 300);
  });
}

// 页面渲染后创建回到顶部按钮
document.addEventListener('DOMContentLoaded', createBackToTop);

function renderChat(root) {
  const allMessages = getDB('messages');
  const heroConfig = getDB('heroConfig')[0] || { image: '', logo: '' };
  const user = getCurrentUser();
  const userId = user?.id || 'guest';
  
  const messages = allMessages.filter(m => {
    if (m.isAdmin && m.targetUserId === userId) return true;
    if (!m.isAdmin && m.userId === userId) return true;
    return false;
  });
  
  let messageHtml = '';
  
  if (messages.length === 0) {
    messageHtml = `<div class="empty-state"><i class="fas fa-comments"></i><p>暂无消息，发送一条给站主吧</p></div>`;
  } else {
    messages.sort((a, b) => a.time - b.time).forEach(m => {
      messageHtml += `
        <div class="chat-message ${m.isAdmin ? 'admin' : 'user'}">
          <div>
            <div class="chat-bubble">${m.content}</div>
            <div class="chat-timestamp">${formatTime(m.time)}</div>
          </div>
        </div>
      `;
    });
  }

  root.innerHTML = `
    <nav class="navbar">
      <div class="navbar-content">
        <div class="navbar-brand">
          <div class="navbar-logo">
            ${heroConfig.logo ? `<img src="${heroConfig.logo}" alt="Logo">` : '<i class="fas fa-images text-white text-lg"></i>'}
          </div>
          <h1 class="navbar-title">轻图社资源仓库</h1>
        </div>
        <button class="btn btn-secondary" onclick="go('#index')">
          <i class="fas fa-arrow-left"></i><span class="btn-text">返回</span>
        </button>
      </div>
    </nav>

    <div class="container animate-fade-in" style="padding-bottom: 80px;">
      <div class="card" style="padding: 1rem;">

}

function renderAdmin(root) {
  if (!isAdmin()) {
    go('#login');
    return;
  }

  uploadedImages = [];

  const albums = getDB('albums');
  const messages = getDB('messages');
  const orders = getDB('orders');
  const paymentConfig = getDB('paymentConfig')[0] || { type: 'alipay', qrCode: '' };
  const heroConfig = getDB('heroConfig')[0] || { image: '' };
  const categories = getDB('categories');
  const conversations = getConversations();
  
  // 计算未读消息数量（用户发送的消息，且没有被管理员回复的）
  const unreadCount = messages.filter(m => !m.isAdmin && !m.read).length;
  
  // 确保有默认分类
  if (categories.length === 0) {
    setDB('categories', [{ id: 'home', name: '首页', sort: 0 }]);
  }
  
  let listHtml = '';
  let messageHtml = '';
  let orderHtml = '';
  let conversationHtml = '';
  let categoryHtml = '';

  if (albums.length === 0) {
    listHtml = `<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无图集</p></div>`;
  } else {
    listHtml = '';
    albums.forEach(a => {
      const linkStatus = a.linkStatus || 'normal';
      const statusText = linkStatus === 'normal' ? '正常' : linkStatus === 'invalid' ? '失效' : '已取消分享';
      listHtml += `
        <div class="admin-item">
          <div class="admin-item-info">
            <div class="admin-item-title">${a.title}</div>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
              <span class="admin-item-price">¥${a.price} · ${a.preview.length}张</span>
              <span class="link-status ${linkStatus}">
                <i class="fas fa-link"></i>${statusText}
              </span>
            </div>
          </div>
          <div style="display: flex; gap: 0.5rem;">
            <button class="btn btn-secondary" onclick="editAlbum('${a.id}')">
              <i class="fas fa-edit"></i>编辑
            </button>
            <button class="btn btn-danger" onclick="del('${a.id}')">
              <i class="fas fa-trash"></i>删除
            </button>
          </div>
        </div>
      `;
    });
  }

  // 获取当前选中会话的消息
  const selectedUserId = window.currentUserId || null;
  const currentConversation = conversations.find(c => c.userId === selectedUserId);
  const currentMessages = currentConversation ? messages.filter(m => m.userId === selectedUserId || m.isAdmin) : [];
  
  if (currentMessages.length === 0) {
    messageHtml = selectedUserId ? `<div class="empty-state"><i class="fas fa-comments"></i><p>暂无消息</p></div>` : `<div class="empty-state"><i class="fas fa-comments"></i><p>请选择一个会话开始聊天</p></div>`;
  } else {
    currentMessages.sort((a, b) => a.time - b.time).forEach(m => {
      messageHtml += `
        <div class="chat-message ${m.isAdmin ? 'self' : 'other'}">
          <div>
            <div class="chat-bubble">${m.content}</div>
            <div class="chat-timestamp">${formatTime(m.time)}</div>
          </div>
        </div>
      `;
    });
  }

  // 会话列表
  if (conversations.length === 0) {
    conversationHtml = `<div class="empty-state"><i class="fas fa-users"></i><p>暂无用户消息</p></div>`;
  } else {
    conversations.forEach(c => {
      conversationHtml += `
        <div class="message-item ${c.userId === selectedUserId ? 'active' : ''}" onclick="selectConversation('${c.userId}')">
          <div class="message-item-header">
            <span class="message-item-name">${c.username}</span>
            <span class="message-item-time">${formatTime(c.lastTime)}</span>
          </div>
          <div class="message-item-preview">${c.lastMessage}</div>
        </div>
      `;
    });
  }

  if (orders.length === 0) {
    orderHtml = `<div class="empty-state"><i class="fas fa-shopping-cart"></i><p>暂无订单</p></div>`;
  } else {
    orders.forEach(o => {
      orderHtml += `
        <div class="order-item">
          <div class="order-header">
            <span class="order-id">订单号: ${o.id}</span>
            <span class="order-status completed">已完成</span>
          </div>
          <div class="order-info">
            <span class="order-product">${o.title}</span>
            <span class="order-price">¥${o.price}</span>
          </div>
          <div style="font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.5rem;">
            用户: ${o.username} · ${formatTime(o.time)}
          </div>
        </div>
      `;
    });
  }

  // 分类列表
  if (categories.length === 0) {
    categoryHtml = `<div class="empty-state"><i class="fas fa-tags"></i><p>暂无分类</p></div>`;
  } else {
    categories.sort((a, b) => a.sort - b.sort).forEach((cat, index) => {
      categoryHtml += `
        <div class="category-item-row">
          <button class="sort-btn" onclick="moveCategoryUp('${cat.id}')" ${index === 0 ? 'disabled' : ''}>↑</button>
          <button class="sort-btn" onclick="moveCategoryDown('${cat.id}')" ${index === categories.length - 1 ? 'disabled' : ''}>↓</button>
          <input type="text" value="${cat.name}" onchange="updateCategoryName('${cat.id}', this.value)">
          <button onclick="deleteCategory('${cat.id}')" ${cat.id === 'home' ? 'disabled' : ''}><i class="fas fa-trash"></i></button>
        </div>
      `;
    });
  }

  root.innerHTML = `
    <nav class="navbar">
      <div class="navbar-content">
        <div class="navbar-brand">
          <div class="navbar-logo"><i class="fas fa-cog text-white text-lg"></i></div>
          <h1 class="navbar-title">管理后台</h1>
        </div>
        <div class="navbar-actions" style="display: flex; gap: 0.5rem; align-items: center;">
          <span id="syncStatus" onclick="forceCloudSync()" style="font-size:0.75rem;color:var(--color-text-muted);display:flex;align-items:center;gap:0.25rem;cursor:pointer;" title="点击手动同步"><i class="fas fa-cloud" style="color:var(--color-primary);"></i><span class="btn-text">已同步</span></span>
          <button class="btn btn-secondary" onclick="go('#index')"><i class="fas fa-home"></i><span class="btn-text">前台</span></button>
          <button class="btn btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span class="btn-text">退出</span></button>
        </div>
      </div>
    </nav>

    <div class="container animate-fade-in">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchAdminTab('publish')">发布图集</button>
        <button class="tab-btn" onclick="switchAdminTab('payment')">收款配置</button>
        <button class="tab-btn" style="position: relative;" onclick="switchAdminTab('messages')">
          站主私信
          ${unreadCount > 0 ? `<span class="badge badge-red" style="position: absolute; top: -0.375rem; right: -0.375rem;">${unreadCount}</span>` : ''}
        </button>
        <button class="tab-btn" onclick="switchAdminTab('orders')">订单管理</button>

            <i class="fas fa-plus" style="margin-right: 0.25rem;"></i>发布新图集
          </button>

// 当前选择的支付方式
let selectedPaymentType = 'alipay';
let qrCodeData = '';
function go(hash) {
  // 清理下拉菜单状态
  const dropdown = document.getElementById('userDropdown');
  const toggleBtn = document.querySelector('.user-dropdown-toggle');
  if (dropdown) dropdown.classList.remove('show');
  if (toggleBtn) toggleBtn.classList.remove('active');
  
  // 清理链接状态弹窗
  const linkModal = document.getElementById('linkStatusModal');
  if (linkModal) linkModal.remove();
  
  window.location.hash = hash;
  renderPage();
}

function openAlbum(id) {
  go('#detail=' + id);
}

function searchAlbums() {
  const input = document.getElementById('searchInput');
  const keyword = input ? input.value.trim() : '';
  if (!keyword) {
    renderIndex(document.getElementById('root'), window.currentCategoryId || '');
    return;
  }
  
  const albums = getDB('albums');
  const results = albums.filter(a => 
    a.title.toLowerCase().includes(keyword.toLowerCase()) ||
    (a.description && a.description.replace(/<[^>]*>/g, '').toLowerCase().includes(keyword.toLowerCase()))
  );
  
  const root = document.getElementById('root');
  const heroConfig = getDB('heroConfig')[0] || { image: '', logo: '' };
  const user = getCurrentUser();
  const reviews = getDB('reviews') || [];
  const favorites = getDB('favorites') || [];
  const userOrders = user ? getDB('orders').filter(o => o.userId === user.id) : [];
  const purchasedAlbumIds = new Set(userOrders.map(o => o.albumId));
  
  let resultsHtml = '';
  if (results.length === 0) {
    resultsHtml = `<div class="empty-state"><i class="fas fa-search"></i><p>未找到与"${keyword}"相关的图集</p></div>`;
  } else {
    resultsHtml = `
      <div class="grid-gallery">
        ${results.map((al, index) => {
          const albumReviews = reviews.filter(r => r.albumId === al.id);
          const favCount = favorites.filter(f => f.albumId === al.id).length;
          const canReview = purchasedAlbumIds.has(al.id);
          return `
            <div class="card animate-slide-up" style="animation-delay: ${index * 0.1}s" onclick="openAlbum('${al.id}')">
              <div class="card-image watermark">
                <img src="${al.cover}" alt="${al.title}">
                <div class="card-overlay"></div>
              </div>
              <div class="card-content">
                <p class="card-title">${al.title}</p>
                <div class="flex items-center justify-between mt-2">
                  <span class="card-price">¥ ${al.price}</span>
                  <span class="text-gray-500 text-xs">${al.preview.length}张</span>
                </div>
                <div class="card-review mt-2">
                  <span onclick="event.stopPropagation(); openReview('${al.id}', ${canReview})" style="cursor:pointer;">
                    <i class="fas fa-comment"></i>
                    <span>${albumReviews.length}</span>
                  </span>
                  <span style="margin-left: 0.75rem;">
                    <i class="fas fa-heart"></i>
                    <span>${favCount}</span>
                  </span>
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }
  
  const categories = getDB('categories');
  categories.sort((a, b) => a.sort - b.sort);
  let categoryHtml = categories.map(cat => `
    <div class="category-item" onclick="switchCategory('${cat.id}')">
      ${cat.name}
    </div>
  `).join('');
  
  root.innerHTML = `
    <nav class="navbar">
      <div class="navbar-content">
        <div class="navbar-brand">
          <div class="navbar-logo">
            ${heroConfig.logo ? `<img src="${heroConfig.logo}" alt="Logo">` : '<i class="fas fa-images text-white text-lg"></i>'}
          </div>
          <h1 class="navbar-title">轻图社资源仓库</h1>
        </div>
        ${user ? `
          <div class="user-dropdown">
            <button class="user-dropdown-trigger" onclick="toggleUserMenu()">
              <div style="width: 2rem; height: 2rem; min-width: 2rem; min-height: 2rem; border-radius: 50%; background: var(--color-card-hover); overflow: hidden; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-user" style="color: var(--color-text-muted); font-size: 0.75rem;"></i>
              </div>
              <span style="color: var(--color-text); font-size: 0.875rem; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${user.username}</span>
              <i class="fas fa-chevron-down" style="font-size: 0.625rem; color: var(--color-text-muted);"></i>
            </button>
            <div class="dropdown-menu" id="userDropdown">
              <div class="dropdown-item" onclick="go('#profile')"><i class="fas fa-user-circle"></i>个人主页</div>
              <div class="dropdown-item" onclick="showNicknameModal()"><i class="fas fa-edit"></i>修改昵称</div>
              <div class="dropdown-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i>退出登录</div>
            </div>
          </div>
        ` : `
          <button class="btn btn-secondary" onclick="go('#register')">
            <i class="fas fa-user-plus"></i>注册/登录
          </button>
        `}
      </div>
    </nav>

    <div class="container animate-fade-in">
      <div class="category-nav">
        ${categoryHtml}
      </div>

      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.75rem;">
        <div>
          <h2 class="page-title" style="margin-bottom: 0.25rem;">搜索结果</h2>
          <p class="page-subtitle">关键词"${keyword}"，找到 ${results.length} 个图集</p>
        </div>
        <div style="position: relative;">
          <input type="text" id="searchInput" class="input-field" placeholder="搜索图集..." style="margin-bottom: 0; padding-right: 2.5rem; width: 220px;" value="${keyword}" onkeydown="if(event.keyCode===13) searchAlbums()">
          <button onclick="searchAlbums()" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--color-primary); cursor: pointer; padding: 0.25rem;">
            <i class="fas fa-search"></i>
          </button>
        </div>
      </div>

      ${resultsHtml}
      
      <footer style="text-align: center; padding: 2rem 1rem 1.5rem; margin-top: 2rem; border-top: 1px solid var(--color-border);">
        <p style="font-size: 0.75rem; color: var(--color-text-muted); line-height: 1.8;">
          ${heroConfig.copyright || '© 2024 轻图社 版权所有'}
        </p>
        ${heroConfig.filing ? `<p style="font-size: 0.75rem; color: var(--color-text-muted); line-height: 1.8;">${heroConfig.filing}</p>` : ''}
        ${heroConfig.security ? `<p style="font-size: 0.75rem; color: var(--color-text-muted); line-height: 1.8;">${heroConfig.security}</p>` : ''}
      </footer>
    </div>
  `;
}

function toggleFavorite(albumId) {
  const user = getCurrentUser();
  if (!user) {
    alert('请先登录后再收藏');
    return;
  }
  
  const favorites = getDB('favorites') || [];
  const existingIndex = favorites.findIndex(f => f.albumId === albumId && f.userId === user.id);
  
  if (existingIndex !== -1) {
    favorites.splice(existingIndex, 1);
    setDB('favorites', favorites);
  } else {
    favorites.push({
      albumId,
      userId: user.id,
      username: user.username,
      time: Date.now()
    });
    setDB('favorites', favorites);
  }
  
  renderDetail(document.getElementById('root'), albumId);
}

function showLink() {
  const linkBox = document.getElementById('linkBox');
  if (linkBox) {
    linkBox.classList.add('show');
  }
}

function login() {
  const u = document.getElementById('user').value;
  const p = document.getElementById('pwd').value;
  const rememberMe = document.getElementById('rememberMe')?.checked || false;
  
  const adminConfig = getDB('adminConfig')[0] || { username: 'admin', password: '123456' };
  
  if (u === adminConfig.username && p === adminConfig.password) {
    localStorage.setItem('admin', 'ok');
    localStorage.setItem('adminRemember', rememberMe ? 'true' : 'false');
    localStorage.setItem('adminId', '6688');
    go('#admin');
  } else {
    alert('账号或密码错误');
  }
}

function logout() {
  localStorage.removeItem('admin');
  localStorage.removeItem('adminId');
  go('#login');
}

// 修改管理员密码
function changeAdminPassword() {
  const oldPwd = document.getElementById('oldPwd').value;
  const newPwd = document.getElementById('newPwd').value;
  const confirmPwd = document.getElementById('confirmPwd').value;
  
  if (!oldPwd || !newPwd || !confirmPwd) {
    alert('请填写完整信息');
    return;
  }
  
  if (newPwd !== confirmPwd) {
    alert('两次输入的新密码不一致');
    return;
  }
  
  if (newPwd.length < 6) {
    alert('密码长度不能少于6位');
    return;
  }
  
  const adminConfig = getDB('adminConfig')[0] || { username: 'admin', password: '123456' };
  
  if (oldPwd !== adminConfig.password) {
    alert('原密码错误');
    return;
  }
  
  adminConfig.password = newPwd;
  setDB('adminConfig', [adminConfig]);
  
  alert('密码修改成功，请重新登录');
  logout();
}

function switchHeroSubTab(tab) {
  document.querySelectorAll('.sub-tab-btn').forEach(btn => {
    btn.classList.remove('active');
    btn.style.borderBottomColor = 'transparent';
    btn.style.color = 'var(--color-text-muted)';
  });
  const activeBtn = document.querySelector(`.sub-tab-btn[onclick="switchHeroSubTab('${tab}')"]`);
  activeBtn.classList.add('active');
  activeBtn.style.borderBottomColor = 'var(--color-primary)';
  activeBtn.style.color = 'var(--color-text)';
  document.getElementById('heroSubDecorate').style.display = tab === 'decorate' ? 'block' : 'none';
  document.getElementById('heroSubPopup').style.display = tab === 'popup' ? 'block' : 'none';
}

function switchPublishSubTab(tab) {
  document.querySelectorAll('.publish-sub-tab').forEach(btn => {
    btn.classList.remove('active');
    btn.style.borderBottomColor = 'transparent';
    btn.style.color = 'var(--color-text-muted)';
  });
  const activeBtn = document.querySelector(`.publish-sub-tab[onclick="switchPublishSubTab('${tab}')"]`);
  activeBtn.classList.add('active');
  activeBtn.style.borderBottomColor = 'var(--color-primary)';
  activeBtn.style.color = 'var(--color-text)';
  document.getElementById('publishSubNew').style.display = tab === 'new' ? 'block' : 'none';
  document.getElementById('publishSubList').style.display = tab === 'list' ? 'block' : 'none';
}

function switchAdminTab(tabName) {
  // 切换按钮状态
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="switchAdminTab('${tabName}')"]`).classList.add('active');
  
  // 切换内容显示
  document.querySelectorAll('.tab-content').forEach(content => content.style.display = 'none');
  document.getElementById(`tab-${tabName}`).style.display = 'block';
  
  // 如果是消息页面，滚动到底部并标记消息为已读
  if (tabName === 'messages') {
    markMessagesAsRead();
    setTimeout(() => scrollChatToBottom('adminChatContainer'), 100);
  }
}

// 标记消息为已读
function markMessagesAsRead() {
  const messages = getDB('messages');
  const updatedMessages = messages.map(m => ({ ...m, read: true }));
  setDB('messages', updatedMessages);
  // 更新未读消息徽章显示
  const badge = document.querySelector('.badge-red');
  if (badge) {
    badge.style.display = 'none';
  }
}

// 收款配置功能
// ==========================================
function selectPayment(type) {
  selectedPaymentType = type;
  document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('active'));
  document.querySelector(`.payment-option.${type}`).classList.add('active');
}

function handleQrUpload(event) {
  const file = event.target.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    qrCodeData = e.target.result;
    const uploadArea = document.getElementById('qrUploadArea');
    uploadArea.innerHTML = `
      <img src="${qrCodeData}" style="max-width: 150px; max-height: 150px; margin-bottom: 0.5rem;">
      <p style="color: var(--color-text); font-size: 0.875rem;">点击更换收款码</p>
    `;
  };
  reader.readAsDataURL(file);
}

function savePaymentConfig() {
  if (!qrCodeData) {
    alert('请先上传收款码图片');
    return;
  }
  
  const config = {
    type: selectedPaymentType,
    qrCode: qrCodeData
  };
  
  setDB('paymentConfig', [config]);
  alert('收款配置保存成功！');
}

function formatTime(timestamp) {
  const date = new Date(timestamp);
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
}

function scrollChatToBottom(containerId) {

// 图片压缩函数
function compressImage(file, maxWidth = 600, maxHeight = 600, quality = 0.6) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let width = img.width;
      let height = img.height;
      
      // 计算缩放比例
      if (width > maxWidth) {
        height = (height * maxWidth) / width;
        width = maxWidth;
      }
      if (height > maxHeight) {
        width = (width * maxHeight) / height;
        height = maxHeight;
      }
      
      // 创建画布
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      
      // 转换为 Base64
      const compressedDataUrl = canvas.toDataURL(file.type, quality);
      resolve(compressedDataUrl);
    };
    img.onerror = () => {
      // 如果压缩失败，使用原始数据
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);
    };
    img.src = URL.createObjectURL(file);
  });
}

// 处理文件选择
async function handleFileSelect(event) {
  const files = Array.from(event.target.files);
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    
    try {
      const compressedData = await compressImage(file);
      uploadedImages.push(compressedData);
      renderPreview();
    } catch (error) {
      console.error('图片处理失败:', error);
      alert('图片处理失败，请重试');
    }
  }
}

function initDragUpload() {
  const uploadArea = document.getElementById('uploadArea');
  if (!uploadArea) return;
  
  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
  
  uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
  });
  
  uploadArea.addEventListener('drop', async (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    
    const files = Array.from(e.dataTransfer.files);
    for (const file of files) {
      if (!file.type.startsWith('image/')) continue;
      
      try {
        const compressedData = await compressImage(file);
        uploadedImages.push(compressedData);
        renderPreview();
      } catch (error) {
        console.error('图片处理失败:', error);
        alert('图片处理失败，请重试');
      }
    }
  });
}

function getConversations() {
  const messages = getDB('messages');
  const users = getDB('users');
  const conversations = [];
  const userIds = new Set();
  
  messages.forEach(m => {
    if (!m.isAdmin && m.userId) {
      userIds.add(m.userId);
    }
  });
  
  userIds.forEach(userId => {
    const userMessages = messages.filter(m => m.userId === userId || (m.isAdmin && m.targetUserId === userId));
    const lastMessage = userMessages.sort((a, b) => b.time - a.time)[0];
    const user = users.find(u => u.id === userId);
    
    let displayName;
    if (userId === 'guest') {
      const guestMsgs = messages.filter(m => m.userId === 'guest' && m.username);
      displayName = guestMsgs.length > 0 ? guestMsgs[guestMsgs.length - 1].username : '游客';
    } else {
      displayName = user?.username || '未知用户';
    }
    
    conversations.push({
      userId,
      username: displayName,
      lastMessage: lastMessage?.content || '',
      lastTime: lastMessage?.time || 0
    });
  });
  
  return conversations.sort((a, b) => b.lastTime - a.lastTime);
}

  let attempts = 0;
  do {
    const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
    const suffix = suffixes[Math.floor(Math.random() * suffixes.length)];
    nickname = prefix + suffix;
    attempts++;
  } while (usedNames.has(nickname) && attempts < 100);
  
  return nickname;
}

function sendUserMessage() {
  const input = document.getElementById('userMessageInput');
  const content = input.value.trim();
  const user = getCurrentUser();
  
  if (!content) return;
  
  let userId, username;
  if (user) {
    userId = user.id;
    username = user.username;
  } else {
    userId = 'guest';
    username = getGuestNickname();
  }
  
  const message = {
    id: Date.now().toString(),
    content,
    time: Date.now(),
    isAdmin: false,
    userId,
    username,
    read: false
  };
  
  const messages = getDB('messages');
  messages.push(message);
  setDB('messages', messages);
  
  input.value = '';
  
  const container = document.getElementById('userChatContainer');
  container.insertAdjacentHTML('beforeend', `
    <div class="chat-message user">
      <div>
        <div class="chat-bubble">${content}</div>
        <div class="chat-timestamp">${formatTime(Date.now())}</div>
      </div>
    </div>
  `);
  
  scrollChatToBottom('userChatContainer');
}

// ==========================================
// 链接状态管理功能
// ==========================================
function checkLinkStatus(albumId) {
  const albums = getDB('albums');
  const album = albums.find(a => a.id === albumId);
  
  if (!album) return;
  
  // 打开链接状态确认弹窗
  showLinkStatusModal(albumId, album.title, album.link, album.linkStatus);
}

function showLinkStatusModal(albumId, title, link, currentStatus) {
  const modalHtml = `
    <div class="modal-overlay" onclick="closeLinkStatusModal()">
      <div class="modal-content" onclick="event.stopPropagation()" style="max-width: 400px;">
        <div class="modal-header">
          <h3>确认链接状态</h3>
          <button class="modal-close" onclick="closeLinkStatusModal()">×</button>
        </div>
        <div class="modal-body">
          <p style="margin-bottom: 1rem;"><strong>图集名称：</strong>${title}</p>
          <p style="margin-bottom: 1rem;"><strong>网盘链接：</strong><a href="${link}" target="_blank" style="color: var(--color-primary);">点击访问</a></p>
          <p style="margin-bottom: 1.5rem; color: var(--color-text-muted);">请访问链接确认状态后选择：</p>
          <div style="display: flex; gap: 0.5rem;">
            <button class="btn btn-success" onclick="setLinkStatus('${albumId}', 'normal')">
              <i class="fas fa-check-circle"></i>链接正常
            </button>
            <button class="btn btn-danger" onclick="setLinkStatus('${albumId}', 'invalid')">
              <i class="fas fa-times-circle"></i>链接失效
            </button>
          </div>
        </div>
      </div>
    </div>
  `;
  
  const modal = document.createElement('div');
  modal.id = 'linkStatusModal';
  modal.innerHTML = modalHtml;
  document.body.appendChild(modal);
}

function closeLinkStatusModal() {
  const modal = document.getElementById('linkStatusModal');
  if (modal) {
    modal.remove();
  }
}

function setLinkStatus(albumId, status) {
  const albums = getDB('albums');
  const albumIndex = albums.findIndex(a => a.id === albumId);
  
  if (albumIndex !== -1) {
    albums[albumIndex].linkStatus = status;
    setDB('albums', albums);
    alert(`链接状态已更新为: ${status === 'normal' ? '正常' : '失效'}`);
    closeLinkStatusModal();
    if (isAdmin()) {
      renderAdmin(document.getElementById('root'));
    }
  }
}

// 批量检测所有链接状态（需手动确认）
function autoCheckAllLinks() {
  const albums = getDB('albums');
  if (albums.length === 0) {
    alert('暂无图集');
    return;
  }
  
  // 统计当前状态
  const normalCount = albums.filter(a => a.linkStatus === 'normal').length;
  const invalidCount = albums.filter(a => a.linkStatus === 'invalid').length;
  const cancelledCount = albums.filter(a => a.linkStatus === 'cancelled').length;
  
  alert(`当前链接状态统计：\n- 正常: ${normalCount} 个\n- 失效: ${invalidCount} 个\n- 已取消: ${cancelledCount} 个\n\n如需更新状态，请点击每个图集旁的"检测"按钮手动确认。`);
}

// ==========================================
// 首页装扮配置功能
// ==========================================
let heroImageData = '';
let logoImageData = '';
let heroImageList = [];

function initHeroImages() {
  const heroConfig = getDB('heroConfig')[0];
  if (heroConfig) {
    heroImageList = [heroConfig.image, ...(heroConfig.heroImages || [])].filter(Boolean);
    logoImageData = heroConfig.logo || '';
  }
}
initHeroImages();

function handleLogoUpload(event) {
  const file = event.target.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    logoImageData = e.target.result;
    const uploadArea = document.getElementById('logoUploadArea');
    uploadArea.innerHTML = `
      <img src="${logoImageData}" style="max-width: 80px; max-height: 80px; margin-bottom: 0.5rem;">
      <p style="color: var(--color-text); font-size: 0.875rem;">点击更换Logo</p>
    `;
  };
  reader.readAsDataURL(file);
}

function handleHeroImageUpload(event) {
  const file = event.target.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  if (heroImageList.length >= 3) {
    alert('最多只能添加3张横图');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    heroImageList.push(e.target.result);
    updateHeroImageUploadArea();
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function updateHeroImageUploadArea() {
  const container = document.getElementById('heroImagesUploadArea');
  if (!container) return;
  let html = '';
  heroImageList.forEach((img, index) => {
    html += `
      <div class="banner-upload-item">
        <img src="${img}" style="max-width: 150px; max-height: 80px; margin-bottom: 0.5rem;">
        <button class="btn btn-danger btn-sm" onclick="removeHeroImage(${index})">删除</button>
      </div>
    `;
  });
  if (heroImageList.length < 3) {
    html += `
      <div class="upload-area" id="heroImageUploadArea" onclick="document.getElementById('heroImageFileInput').click()">
        <i class="fas fa-plus" style="font-size: 1.5rem; color: var(--color-primary); margin-bottom: 0.5rem;"></i>
        <p style="color: var(--color-text); font-size: 0.875rem;">添加横图</p>
        <p style="color: var(--color-text-muted); font-size: 0.75rem;">还可添加 ${3 - heroImageList.length} 张</p>
      </div>
    `;
  }
  container.innerHTML = html;
}

function removeHeroImage(index) {
  heroImageList.splice(index, 1);
  updateHeroImageUploadArea();
}

function saveHeroConfig() {
  try {
    const copyrightInput = document.getElementById('copyrightInput');
    const filingInput = document.getElementById('filingInput');
    const securityInput = document.getElementById('securityInput');
    const popupEnabled = document.getElementById('popupEnabled');
    const popupTitle = document.getElementById('popupTitle');
    const popupContent = document.getElementById('popupContent');
    const popupBtnText = document.getElementById('popupBtnText');
    const popupBtnLink = document.getElementById('popupBtnLink');
    
    const existingConfig = getDB('heroConfig')[0] || {};
    
    const config = {
      image: heroImageList.length > 0 ? heroImageList[0] : (existingConfig.image || ''),
      heroImages: heroImageList.length > 1 ? heroImageList.slice(1) : (existingConfig.heroImages || []),
      logo: logoImageData || existingConfig.logo || '',
      copyright: copyrightInput ? copyrightInput.value.trim() : (existingConfig.copyright || ''),
      filing: filingInput ? filingInput.value.trim() : (existingConfig.filing || ''),
      security: securityInput ? securityInput.value.trim() : (existingConfig.security || ''),
      popupEnabled: popupEnabled ? popupEnabled.checked : (existingConfig.popupEnabled || false),
      popupTitle: popupTitle ? popupTitle.value.trim() : (existingConfig.popupTitle || ''),
      popupContent: popupContent ? popupContent.value.trim() : (existingConfig.popupContent || ''),
      popupBtnText: popupBtnText ? popupBtnText.value.trim() : (existingConfig.popupBtnText || '我知道了'),
      popupBtnLink: popupBtnLink ? popupBtnLink.value.trim() : (existingConfig.popupBtnLink || '')
    };
    
    setDB('heroConfig', [config]);
    alert('配置保存成功！');
  } catch(e) {
    alert('保存失败：' + e.message);
  }
}

// ==========================================
// 分类管理功能
// ==========================================
function addCategory() {
  const name = prompt('请输入分类名称：');
  if (!name || !name.trim()) return;
  
  const categories = getDB('categories');
  const exists = categories.find(c => c.name === name.trim());
  
  if (exists) {
    alert('分类已存在');
    return;
  }
  
  categories.push({
    id: Date.now().toString(),
    name: name.trim(),
    sort: categories.length
  });
  
  setDB('categories', categories);
  renderAdmin(document.getElementById('root'));
}

function updateCategoryName(categoryId, newName) {
  if (!newName || !newName.trim()) return;
  
  const categories = getDB('categories');
  const index = categories.findIndex(c => c.id === categoryId);
  
  if (index === -1) return;
  
  // 检查是否重名
  const exists = categories.find(c => c.id !== categoryId && c.name === newName.trim());
  if (exists) {
    alert('分类名称已存在');
    // 恢复原来的名称
    renderAdmin(document.getElementById('root'));
    return;
  }
  
  categories[index].name = newName.trim();
  setDB('categories', categories);
}

function deleteCategory(categoryId) {
  if (categoryId === 'home') {
    alert('首页分类不能删除');
    return;
  }
  
  if (!confirm('确定删除此分类？')) return;
  
  const categories = getDB('categories').filter(c => c.id !== categoryId);
  // 更新排序
  categories.forEach((c, index) => {
    c.sort = index;
  });
  setDB('categories', categories);
  
  // 更新图集的分类引用
  const albums = getDB('albums');
  albums.forEach(a => {
    if (a.categoryId === categoryId) {
      a.categoryId = '';
    }
  });
  setDB('albums', albums);
  
  renderAdmin(document.getElementById('root'));
}

function moveCategoryUp(categoryId) {
  const categories = getDB('categories');
  const index = categories.findIndex(c => c.id === categoryId);
  
  if (index <= 0) return;
  
  // 交换位置
  const temp = categories[index];
  categories[index] = categories[index - 1];
  categories[index - 1] = temp;
  
  // 更新排序
  categories.forEach((c, i) => {
    c.sort = i;
  });
  
  setDB('categories', categories);
  renderAdmin(document.getElementById('root'));
}

function moveCategoryDown(categoryId) {
  const categories = getDB('categories');
  const index = categories.findIndex(c => c.id === categoryId);
  
  if (index >= categories.length - 1) return;
  
  // 交换位置
  const temp = categories[index];
  categories[index] = categories[index + 1];
  categories[index + 1] = temp;
  
  // 更新排序
  categories.forEach((c, i) => {
    c.sort = i;
  });
  
  setDB('categories', categories);
  renderAdmin(document.getElementById('root'));
}

// ==========================================
// 支付宝支付弹窗功能
// ==========================================
let countdownInterval = null;
let remainingSeconds = 300; // 5分钟 = 300秒
let currentOrderData = null;

// 显示支付弹窗
function showAlipayModal(amount, link, albumId, albumTitle) {
  currentOrderData = { amount, link, albumId, albumTitle };
  remainingSeconds = 300;
  
  // 获取收款配置
  const paymentConfig = getDB('paymentConfig')[0] || { type: 'alipay', qrCode: '' };
  const hasCustomQr = paymentConfig.qrCode;
  
  const modal = document.createElement('div');
  modal.id = 'alipayModal';
  modal.className = 'modal-overlay show';
  modal.innerHTML = `
    <div class="modal-content">
      <div class="modal-header">
        <button class="modal-close" onclick="closeAlipayModal()">
          <i class="fas fa-times"></i>
        </button>
        <h3>
          <i class="fas fa-qrcode" style="margin-right: 0.5rem;"></i>
          ${paymentConfig.type === 'alipay' ? '支付宝支付' : '微信支付'}
        </h3>
      </div>
      <div class="modal-body">
        <div class="qr-container">
          ${hasCustomQr ? `
            <img src="${paymentConfig.qrCode}" style="max-width: 100%; height: auto; max-height: 220px; border-radius: 0.5rem; margin: 0 auto; display: block;">
          ` : `
            <div class="qr-code">
              <svg viewBox="0 0 100 100">
                <rect width="100" height="100" fill="${paymentConfig.type === 'alipay' ? '#1677ff' : '#10b981'}"/>
                <rect x="10" y="10" width="25" height="25" fill="white"/>
                <rect x="65" y="10" width="25" height="25" fill="white"/>
                <rect x="10" y="65" width="25" height="25" fill="white"/>
                <rect x="40" y="40" width="20" height="20" fill="white"/>
                <rect x="70" y="70" width="8" height="8" fill="white"/>
                <rect x="70" y="78" width="8" height="2" fill="white"/>
                <rect x="78" y="70" width="2" height="8" fill="white"/>
              </svg>
            </div>
          `}
        </div>
        
        <div class="amount-display">
          <div class="amount-label">支付金额</div>
          <div class="amount-value">¥ ${amount}</div>
        </div>
        
        <div class="countdown-container">
          <div class="countdown-label">支付有效期</div>
          <div class="countdown-value" id="countdown">05:00</div>
        </div>
        
        <button class="btn" style="width: 100%; margin-top: 1rem; text-align: center;" onclick="simulatePayment()">
          <i class="fas fa-check-circle"></i>
          确认已支付
        </button>
        
        <div class="payment-tips">
          <p><i class="fas fa-mobile-alt"></i>打开${paymentConfig.type === 'alipay' ? '支付宝' : '微信'}扫码支付</p>
          <p><i class="fas fa-clock"></i>支付后点击确认按钮获取链接</p>
        </div>
      </div>
    </div>
  `;
  
  document.body.appendChild(modal);
  
  // 点击遮罩层关闭弹窗
  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      closeAlipayModal();
    }
  });
  
  // 启动倒计时
  startCountdown();
}

// 关闭支付宝弹窗
function closeAlipayModal() {
  const modal = document.getElementById('alipayModal');
  if (modal) {
    modal.classList.remove('show');
    setTimeout(() => {
      document.body.removeChild(modal);
    }, 300);
  }
  
  // 停止倒计时
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
}

// 启动倒计时
function startCountdown() {
  updateCountdown();
  countdownInterval = setInterval(() => {
    remainingSeconds--;
    updateCountdown();
    
    if (remainingSeconds <= 0) {
      clearInterval(countdownInterval);
      countdownInterval = null;
      alert('支付已超时，请重新购买');
      closeAlipayModal();
    }
  }, 1000);
}

// 更新倒计时显示
function updateCountdown() {
  const minutes = Math.floor(remainingSeconds / 60);
  const seconds = remainingSeconds % 60;
  const countdownEl = document.getElementById('countdown');
  if (countdownEl) {
    countdownEl.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  }
}

// 模拟支付成功
function simulatePayment() {
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
  
  // 创建订单记录（如果用户已登录）
  if (isUserLoggedIn() && currentOrderData) {
    const order = {
      id: Date.now().toString(),
      userId: getCurrentUser().id,
      username: getCurrentUser().username,
      albumId: currentOrderData.albumId,
      title: currentOrderData.albumTitle,
      price: currentOrderData.amount,
      link: currentOrderData.link,
      time: Date.now(),
      status: 'completed'
    };
    
    const orders = getDB('orders');
    orders.push(order);
    setDB('orders', orders);
  }
  
  closeAlipayModal();
  
  // 显示下载链接
  const linkBox = document.getElementById('linkBox');
  if (linkBox) {
    linkBox.classList.add('show');
  }
}

// 复制链接功能
function copyLink(url, button) {
  navigator.clipboard.writeText(url).then(() => {
    button.innerHTML = '<i class="fas fa-check"></i> 已复制';
    button.classList.add('copied');
    
    setTimeout(() => {
      button.innerHTML = '<i class="fas fa-copy"></i> 复制链接';
      button.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // 降级方案
    const textarea = document.createElement('textarea');
    textarea.value = url;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    
    button.innerHTML = '<i class="fas fa-check"></i> 已复制';
    button.classList.add('copied');
    
    setTimeout(() => {
      button.innerHTML = '<i class="fas fa-copy"></i> 复制链接';
      button.classList.remove('copied');
    }, 2000);
  });
}

// ==========================================
// 启动
// ==========================================
window.onload = function() {
  const overlay = document.getElementById('loadingOverlay');
  if (overlay) {
    overlay.style.opacity = '0';
    setTimeout(() => overlay.remove(), 300);
  }
  renderPage();
  window.addEventListener('hashchange', renderPage);
  
  cloudInitAsync();
};

async function cloudInitAsync() {
  try {
    await cloudInit();
    showUpdateNotification();
  } catch (e) {
    console.warn('云端同步完成（使用本地缓存）');
  }
}

function showUpdateNotification() {
  const existingToast = document.getElementById('syncToast');
  if (existingToast) existingToast.remove();
  
  const toast = document.createElement('div');
  toast.id = 'syncToast';
  toast.style.cssText = `
    position: fixed;
    bottom: 3rem;
    right: 1rem;
    background: linear-gradient(135deg, var(--color-primary), #6d28d9);
    color: white;
    padding: 0.75rem 1.25rem;
    border-radius: 0.5rem;
    box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    animation: slideUp 0.3s ease-out;
    cursor: pointer;
  `;
  toast.innerHTML = `
    <i class="fas fa-cloud-download-alt"></i>
    <span style="font-size: 0.875rem;">数据已更新，点击刷新</span>
  `;
  toast.onclick = function() {
    window.location.reload();
  };
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 5000);
}
